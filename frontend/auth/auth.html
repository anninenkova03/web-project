<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - Web Presentations</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: flex;
        }

        .auth-sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-sidebar h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .auth-sidebar p {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .auth-main {
            padding: 60px 40px;
            width: 60%;
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid #eee;
        }

        .auth-tab {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #666;
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .auth-tab.active {
            color: #667eea;
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.error input {
            border-color: #ff4444;
        }

        .error-message {
            color: #ff4444;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .form-group.error .error-message {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .demo-credentials {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
            }

            .auth-sidebar, .auth-main {
                width: 100%;
            }

            .auth-sidebar {
                padding: 40px 30px;
            }

            .auth-main {
                padding: 40px 30px;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-sidebar">
            <h1>🎯 Web Presentations</h1>
            <p>
                Създавайте, споделяйте и управлявайте вашите презентации с лекота. 
                Използвайте SLIM markup език за бързо създаване на професионални презентации.
            </p>
        </div>

        <div class="auth-main">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginUsername">Потребител или Email</label>
                    <input type="text" id="loginUsername" name="login" required>
                    <span class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Парола</label>
                    <input type="password" id="loginPassword" name="password" required>
                    <span class="error-message"></span>
                </div>

                <button type="submit" class="btn-submit">Вход</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerUsername">Потребителско име</label>
                    <input type="text" id="registerUsername" name="username" required>
                    <span class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" name="email" required>
                    <span class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="registerFullName">Пълно име</label>
                    <input type="text" id="registerFullName" name="full_name" required>
                    <span class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Парола</label>
                    <input type="password" id="registerPassword" name="password" required>
                    <span class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="registerPasswordConfirm">Потвърди парола</label>
                    <input type="password" id="registerPasswordConfirm" name="password_confirmation" required>
                    <span class="error-message"></span>
                </div>

                <button type="submit" class="btn-submit">Регистрация</button>
            </form>
        </div>
    </div>

    <script src="../shared/AuthService.js"></script>
    <script src="auth.js"></script>
</body>
</html>
