<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Map - Карта на презентацията</title>
    <link rel="stylesheet" href="map.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="presentationTitle">Карта на презентацията</h1>
                <p id="presentationSubtitle">Визуализация на структурата</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="viewBtn">Преглед</button>
                <button class="btn btn-secondary" id="backBtn">Назад</button>
            </div>
        </header>

        <div class="map-container">
            <div class="map-header">
                <h2>Структура на слайдовете</h2>
                <div class="view-toggle">
                    <button class="btn active" id="gridViewBtn">Grid</button>
                    <button class="btn" id="flowViewBtn">Flow</button>
                </div>
            </div>

            <div class="map-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalSlides">0</div>
                    <div class="stat-label">Общо слайдове</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="slideTypes">0</div>
                    <div class="stat-label">Типа слайдове</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="duration">~0</div>
                    <div class="stat-label">Примерна продължителност</div>
                </div>
            </div>

            <div id="mapContent"></div>

            <div class="legend">
                <h3>Легенда - Типове слайдове</h3>
                <div class="legend-items">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #e3f2fd;"></div>
                        <span>Title - Заглавен слайд</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #f3e5f5;"></div>
                        <span>Content - Съдържание</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #e8f5e9;"></div>
                        <span>Code - Код</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #fff3e0;"></div>
                        <span>Image-Text - Картина + Текст</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api-service.js"></script>
    <script src="map.js"></script>
    
    <script>
        // Quick fix: Update map.js init function to use apiService
        // Вместо demo data, използвай:
        // currentPresentation = await apiService.getFullPresentation(presentationId);
    </script>
</body>
</html>
