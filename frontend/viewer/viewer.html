<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Viewer</title>
    <link rel="stylesheet" href="viewer.css">
</head>
<body>
    <div class="viewer-container">
        <!-- Header -->
        <div class="viewer-header">
            <div class="presentation-title" id="presentationTitle">Зареждане...</div>
            <div class="header-controls">
                <div class="slide-counter" id="slideCounter">1 / 1</div>
                <button class="btn-icon fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
                <button class="btn-icon" id="mapBtn">🗺️ Карта</button>
                <button class="btn-icon btn-back" id="backBtn">← Назад</button>
            </div>
        </div>

        <!-- Main Slide Area -->
        <div class="slide-container">
            <div class="slide" id="slideContent">
                <!-- Slide content will be injected here -->
            </div>
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <button class="nav-button" id="prevBtn" disabled>
                ← Предишен
            </button>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <button class="nav-button" id="nextBtn">
                Следващ →
            </button>
        </div>
    </div>

    <!-- Keyboard Shortcuts Info -->
    <div class="shortcuts-info" id="shortcutsInfo">
        <p><strong>Клавишни комбинации:</strong></p>
        <p>← / → : Навигация</p>
        <p>F : Fullscreen</p>
        <p>Esc : Изход</p>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="viewer.js"></script>
</body>
</html>
